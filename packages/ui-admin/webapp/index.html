<!DOCTYPE html>
<html>
    <head>
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>UI5 Event Registration - Admin UI</title>

        <script>
            window["sap-ushell-config"] = {
                defaultRenderer: "fiori2",
                bootstrapPlugins: {
                    "RuntimeAuthoringPlugin": {
                        component: "sap.ushell.plugins.rta",
                        config: {
                            validateAppVersion: false
                        }
                    }
                },
                renderers: {
                    fiori2: {
                        componentData: {
                            config: {
                                rootIntent: "Admin-display",
                                search: "hidden"
                            }
                        }
                    }
                },
                applications: {
                    "Admin-display": {
                        title: "Admin UI",
                        description: "Admin UI",
                        additionalInformation: "SAPUI5.Component=sap.ui.eventregistration.admin",
                        applicationType: "URL",
                        url: "./",
                        navigationMode: "embedded"
                    }
                }
            };
        </script>

        <script id="sap-ushell-bootstrap" src="https://ui5.sap.com/1.136.18/test-resources/sap/ushell/bootstrap/sandbox.js"></script>

        <script id="sap-ui-bootstrap"
            src="https://ui5.sap.com/1.136/resources/sap-ui-core.js"
            data-sap-ui-async="true"
            data-sap-ui-libs="sap.m, sap.ushell, sap.ui.core, sap.f, sap.fe.templates, sap.ui.table, sap.ui.layout"
            data-sap-ui-compatVersion="edge"
            data-sap-ui-theme="sap_fiori_3"
            data-sap-ui-frameOptions="allow"
            data-sap-ui-language="en"
            data-sap-ui-xx-supportedLanguages="en,de"
            data-sap-ui-bindingSyntax="complex"
        ></script>

        <script>
            sap.ui.require(["sap/ui/core/Core"], function (Core) {
                Core.ready().then(function () {
                    sap.ushell.Container.createRenderer(undefined, true).then(function (oRenderer) {
                        oRenderer.placeAt("content");
                    });
                });
            });
        </script>
    </head>
    <body class="sapUiBody" id="content"></body>
</html>
